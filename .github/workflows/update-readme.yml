name: Update README project order

on:
  schedule:
    - cron: '0 6 * * *' # daily at 6am UTC
  workflow_dispatch: # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Reorder projects by last commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # project definitions: repo|name|description|status|language|lang_color|lang_logo
          PROJECTS=(
            "thalamus|thalamus|Geopolitical intelligence agent for identifying non-obvious trading signals|active|Python|3776ab|python"
            "col.run|col.run|AI-powered running coach and training companion|active|TypeScript|3178c6|typescript"
            "clip-path-editor|clip-path-editor|Visual CSS clip-path editor with bezier curve support|complete|TypeScript|3178c6|typescript"
          )

          # get last push date for each project and sort
          declare -A push_dates
          sorted_projects=()

          for project in "${PROJECTS[@]}"; do
            repo=$(echo "$project" | cut -d'|' -f1)
            pushed_at=$(gh api "repos/akjcon/$repo" --jq '.pushed_at' 2>/dev/null || echo "1970-01-01T00:00:00Z")
            push_dates["$project"]="$pushed_at"
          done

          # sort projects by push date (most recent first)
          IFS=$'\n' sorted_projects=($(for project in "${PROJECTS[@]}"; do
            echo "${push_dates[$project]}|$project"
          done | sort -r | cut -d'|' -f2-))
          unset IFS

          # generate blockquote rows
          content=""
          for project in "${sorted_projects[@]}"; do
            IFS='|' read -r repo name desc status lang lang_color lang_logo <<< "$project"
            status_color="34d058"
            [ "$status" = "complete" ] && status_color="8b949e"
            badge_img() { echo "<picture><img src=\"$1\" alt=\"$2\" height=\"20\" valign=\"middle\"></picture>"; }
            content+="> **[$name](https://github.com/akjcon/$repo)** \\&nbsp; $(badge_img "https://img.shields.io/badge/status-$status-$status_color" "$status") $(badge_img "https://img.shields.io/badge/$lang-${lang_color}?logo=${lang_logo}\\&logoColor=white" "$lang") $(badge_img "https://img.shields.io/github/last-commit/akjcon/$repo?color=58a6ff\\&label=last%20commit" "last commit") $(badge_img "https://img.shields.io/github/commit-activity/t/akjcon/$repo?color=a371f7\\&label=commits" "commits")
          >
          > $desc

          "
          done

          # replace content between markers
          awk -v content="$content" '
            /<!-- BEGIN PROJECTS -->/ { print; printf "%s", content; skip=1; next }
            /<!-- END PROJECTS -->/ { skip=0 }
            !skip { print }
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit and push if changed
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Auto-reorder projects by last commit date"
          git push
